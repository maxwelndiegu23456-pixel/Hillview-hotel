<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <form action="">
        <fieldset>
            <legend class="booking-credentials">Booking credentials</legend>
            NAME:
            <input type="text" placeholder="Enter Name " class="name-field"> <br> <br>
            ROOM TYPE:
            <select name="" id="" class="room-type">
                <option value="select">--SELECT--</option>
                <option value="standard">Standard</option>
                <option value="deluxes">Deluxes</option>
                <option value="family">Family Suites</option>
                <option value="honeymoon">Honeymoon</option>
                <option value="presidential">Presidential Suite</option>
            </select> <br> <br>

            PRICE: <br>
            <input type="radio" name="rooms" id="standard" value="5000">5,000 <br>
            <input type="radio" name="rooms" id="deluxes" value="7000">7,000 <br>
            <input type="radio" name="rooms" id="family" value="8000">8,000 <br>
            <input type="radio" name="rooms" id="honeymoon" value="10,000">10,000 <br>
            <input type="radio" name="rooms" id="presidential" value="20,000">20,000 <br> <br>
            Click Button to Pay: <br>
            <input type="submit" name="pay" value="Pay" class="pay-button">
        </fieldset>
     </form>
</body>
</html>
